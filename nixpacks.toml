[phases.setup]
nixPkgs = ["nodejs_20", "python312", "python312Packages.pip"]

[phases.install]
cmds = [
    "cd web && npm install",
    "python -m pip install -r requirements.txt"
]

[phases.build]
cmds = ["cd web && npm run build"]

[start]
cmd = "python -m uvicorn src.api:app --host 0.0.0.0 --port ${PORT:-8000}"
